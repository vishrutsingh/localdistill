<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb7185"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="600" fill="#020617"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1100" height="600" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="35" fill="url(#titleGrad)" font-size="20" font-weight="700" text-anchor="middle" filter="url(#glow)">localdistill — Prompt Lifecycle &amp; System Architecture</text>
  <circle cx="340" cy="30" r="5" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>

  <!-- Phase 1: Capture boundary -->
  <rect x="15" y="55" width="330" height="380" rx="10" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="25" y="72" fill="#34d399" font-size="11" font-weight="700">PHASE 1 — CAPTURE</text>

  <!-- Phase 2: Curate boundary -->
  <rect x="365" y="55" width="355" height="380" rx="10" fill="rgba(167,139,250,0.04)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="375" y="72" fill="#a78bfa" font-size="11" font-weight="700">PHASE 2 — CURATE</text>

  <!-- Phase 3: Train boundary -->
  <rect x="740" y="55" width="345" height="380" rx="10" fill="rgba(251,191,36,0.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="750" y="72" fill="#fbbf24" font-size="11" font-weight="700">PHASE 3 — TRAIN</text>

  <!-- ═══ PHASE 1 COMPONENTS ═══ -->

  <!-- Hermes Agent -->
  <rect x="30" y="95" width="290" height="55" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="30" y="95" width="290" height="55" rx="6" fill="rgba(8,51,68,0.4)"/>
  <text x="175" y="115" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Hermes Agent</text>
  <text x="175" y="133" fill="#94a3b8" font-size="9" text-anchor="middle">custom:localdistill provider → :8787</text>
  <text x="175" y="178" fill="#22d3ee" font-size="8" text-anchor="middle">▲ user prompt originates here</text>

  <!-- Arrows: Hermes → Proxy -->
  <line x1="175" y1="150" x2="175" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- localdistill Proxy -->
  <rect x="30" y="185" width="290" height="55" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="30" y="185" width="290" height="55" rx="6" fill="rgba(6,78,59,0.4)"/>
  <text x="175" y="205" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Proxy Server</text>
  <text x="175" y="223" fill="#94a3b8" font-size="9" text-anchor="middle">/v1/chat/completions :8787</text>

  <!-- Arrows: Proxy → Quality -->
  <line x1="175" y1="240" x2="175" y2="275" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-emerald)"/>

  <!-- Quality Scoring Engine -->
  <rect x="30" y="280" width="290" height="55" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="30" y="280" width="290" height="55" rx="6" fill="rgba(6,78,59,0.3)"/>
  <text x="175" y="300" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Quality Scoring Engine</text>
  <text x="175" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">10 regex signal detectors / turn</text>

  <!-- Arrows: Proxy → litellm (horizontal, crossing phase boundary) -->
  <line x1="320" y1="212" x2="363" y2="212" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="200" fill="#fbbf24" font-size="8" text-anchor="middle">litellm</text>

  <!-- litellm / OpenRouter (in Phase 1 but on the right edge) -->
  <rect x="30" y="360" width="290" height="45" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="30" y="360" width="290" height="45" rx="6" fill="rgba(30,41,59,0.5)"/>
  <text x="175" y="378" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">litellm → OpenRouter → Real API</text>
  <text x="175" y="394" fill="#94a3b8" font-size="8" text-anchor="middle">auto-prefixes openrouter/ model names</text>

  <!-- Arrows: Proxy → litellm -->
  <line x1="175" y1="360" x2="175" y2="337" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- ═══ DATA FLOW from Phase 1 → DB ═══ -->

  <!-- Arrows: Quality → DB (down) -->
  <line x1="175" y1="335" x2="175" y2="475" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="185" y="410" fill="#a78bfa" font-size="8">logs signals</text>

  <!-- Arrows: litellm → DB -->
  <line x1="175" y1="405" x2="175" y2="475" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══ SHARED DATABASE ═══ -->
  <rect x="160" y="480" width="370" height="75" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="160" y="480" width="370" height="75" rx="8" fill="rgba(76,29,149,0.25)"/>
  <text x="345" y="503" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">SQLite Database (shared via bind mount)</text>
  <text x="345" y="520" fill="#c4b5fd" font-size="9" text-anchor="middle">conversations | interactions | signals | curated_training | rag | training_runs</text>
  <text x="345" y="540" fill="#a78bfa" font-size="8" text-anchor="middle">~6 tables · WAL mode · foreign keys enforced</text>

  <!-- ═══ PHASE 2 COMPONENTS ═══ -->

  <!-- MCP Server -->
  <rect x="380" y="95" width="320" height="55" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="380" y="95" width="320" height="55" rx="6" fill="rgba(6,78,59,0.4)"/>
  <text x="540" y="115" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">MCP Curation Server</text>
  <text x="540" y="133" fill="#94a3b8" font-size="9" text-anchor="middle">5 tools: signal / get_last / search / status / add_to_rag</text>

  <!-- Arrows: Hermes ↔ MCP (curation feedback) -->
  <path d="M 320 122 Q 350 122 375 122" fill="none" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="350" y="115" fill="#fb7185" font-size="7">inline curation</text>

  <!-- API Server -->
  <rect x="380" y="195" width="320" height="55" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="380" y="195" width="320" height="55" rx="6" fill="rgba(6,78,59,0.4)"/>
  <text x="540" y="215" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">REST API Server :8000</text>
  <text x="540" y="233" fill="#94a3b8" font-size="9" text-anchor="middle">/status · /conversations · /rate · /export · /search</text>

  <!-- Dashboard -->
  <rect x="380" y="300" width="320" height="50" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="380" y="300" width="320" height="50" rx="6" fill="rgba(8,51,68,0.4)"/>
  <text x="540" y="318" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Dashboard :8000/</text>
  <text x="540" y="336" fill="#94a3b8" font-size="9" text-anchor="middle">Tailwind + Chart.js · 30s auto-refresh</text>

  <!-- Arrows: API → Dashboard -->
  <line x1="540" y1="250" x2="540" y2="297" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrows: MCP → DB -->
  <line x1="460" y1="150" x2="300" y2="477" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrows: API → DB -->
  <line x1="480" y1="250" x2="310" y2="477" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ PHASE 2 → PHASE 3 TRANSITION ═══ -->

  <!-- Arrow: curated_training → exporter -->
  <path d="M 530 480 L 530 445 L 740 445 L 740 200" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="635" y="438" fill="#fbbf24" font-size="8" text-anchor="middle">curated conversations exported</text>

  <!-- ═══ PHASE 3 COMPONENTS ═══ -->

  <!-- dataset_exporter -->
  <rect x="755" y="95" width="315" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="755" y="95" width="315" height="50" rx="6" fill="rgba(6,78,59,0.4)"/>
  <text x="912" y="113" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">dataset_exporter.py</text>
  <text x="912" y="131" fill="#94a3b8" font-size="9" text-anchor="middle">queries curated_training → ChatML / ShareGPT / Alpaca JSONL</text>

  <!-- Arrows: exporter → trainer -->
  <line x1="912" y1="145" x2="912" y2="185" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- train.py -->
  <rect x="755" y="190" width="315" height="60" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="755" y="190" width="315" height="60" rx="6" fill="rgba(120,53,15,0.3)"/>
  <text x="912" y="212" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">train.py (Unsloth LoRA)</text>
  <text x="912" y="230" fill="#fbbf24" font-size="9" text-anchor="middle">loads base model 4-bit → trains LoRA adapter</text>
  <text x="912" y="244" fill="#94a3b8" font-size="8" text-anchor="middle">--cloud runpod flag for GPU fallback</text>

  <!-- Arrows: trainer → output -->
  <line x1="912" y1="250" x2="912" y2="290" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LoRA → Ollama -->
  <rect x="755" y="295" width="315" height="55" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="755" y="295" width="315" height="55" rx="6" fill="rgba(76,29,149,0.4)"/>
  <text x="912" y="315" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">LoRA Adapter → Ollama / GGUF</text>
  <text x="912" y="333" fill="#94a3b8" font-size="9" text-anchor="middle">local model approximating API behavior</text>
  <text x="912" y="375" fill="#a78bfa" font-size="8" text-anchor="middle">▼ deployed as local inference model</text>

  <!-- Feedback arrow: LoRA back to Hermes -->
  <path d="M 755 322 Q 725 322 680 322 Q 600 322 600 360 Q 600 580 345 580 Q 175 580 175 555" fill="none" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="460" y="570" fill="#fb7185" font-size="8" text-anchor="middle">feedback loop: trained model replaces API calls</text>

  <!-- Weekly Cron -->
  <rect x="755" y="385" width="315" height="45" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <rect x="755" y="385" width="315" height="45" rx="6" fill="rgba(30,41,59,0.3)"/>
  <text x="912" y="403" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Cron: "0 2 * * 0" (weekly Sunday 2am)</text>
  <text x="912" y="420" fill="#64748b" font-size="8" text-anchor="middle">hermes cron create --schedule "0 2 * * 0"</text>

  <!-- Arrows: cron → trainer -->
  <line x1="755" y1="407" x2="750" y2="220" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ AUTO-PROMOTE LOGIC BOX ═══ -->
  <rect x="30" y="450" width="120" height="24" rx="4" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="0.5"/>
  <text x="90" y="466" fill="#34d399" font-size="8" text-anchor="middle">auto-promote ≥ 0.70</text>
  <rect x="155" y="450" width="120" height="24" rx="4" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="215" y="466" fill="#fb7185" font-size="8" text-anchor="middle">auto-exclude ≤ 0.25</text>

  <!-- ═══ LEGEND ═══ -->
  <text x="710" y="482" fill="#fff" font-size="10" font-weight="700">Legend</text>

  <rect x="710" y="492" width="14" height="8" rx="2" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1"/>
  <text x="730" y="500" fill="#94a3b8" font-size="8">Frontend / UI</text>

  <rect x="710" y="506" width="14" height="8" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="730" y="514" fill="#94a3b8" font-size="8">Backend / Service</text>

  <rect x="710" y="520" width="14" height="8" rx="2" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="528" fill="#94a3b8" font-size="8">Database / Storage</text>

  <rect x="710" y="534" width="14" height="8" rx="2" fill="rgba(120,53,15,0.6)" stroke="#fbbf24" stroke-width="1"/>
  <text x="730" y="542" fill="#94a3b8" font-size="8">Training / GPU</text>

  <line x1="710" y1="554" x2="724" y2="554" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="730" y="557" fill="#94a3b8" font-size="8">Curation / Feedback</text>

  <rect x="710" y="562" width="14" height="8" rx="2" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1"/>
  <text x="730" y="570" fill="#94a3b8" font-size="8">External API</text>

  <!-- ═══ SCORING DETAIL INLINE ═══ -->
  <text x="25" y="445" fill="#64748b" font-size="8">Base score 0.60 ± signals (± structural bonuses) → clamped [0,1]</text>

  <!-- ═══ PROMPT LIFECYCLE NUMBERS ═══ -->
  <circle cx="13" cy="117" r="9" fill="#22d3ee" opacity="0.8"/>
  <text x="13" y="121" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">1</text>

  <circle cx="13" cy="212" r="9" fill="#34d399" opacity="0.8"/>
  <text x="13" y="216" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">2</text>

  <circle cx="13" cy="308" r="9" fill="#34d399" opacity="0.8"/>
  <text x="13" y="312" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">3</text>

  <circle cx="365" cy="122" r="9" fill="#a78bfa" opacity="0.8"/>
  <text x="365" y="126" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">4</text>

  <circle cx="365" cy="222" r="9" fill="#a78bfa" opacity="0.8"/>
  <text x="365" y="226" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">5</text>

  <circle cx="740" cy="120" r="9" fill="#fbbf24" opacity="0.8"/>
  <text x="740" y="124" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">6</text>

  <circle cx="740" cy="220" r="9" fill="#fbbf24" opacity="0.8"/>
  <text x="740" y="224" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">7</text>

  <circle cx="740" cy="322" r="9" fill="#a78bfa" opacity="0.8"/>
  <text x="740" y="326" fill="#020617" font-size="9" font-weight="700" text-anchor="middle">8</text>
</svg>