# localdistill — LiteLLM Proxy Configuration
# API keys are read from environment variables (set via .env file).

general_settings:
  master_key: "localdistill-dev-key"

model_list:
  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "gpt-4o-mini"
    litellm_params:
      model: "openai/gpt-4o-mini"
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "claude-sonnet-4-20250514"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"

litellm_settings:
  # Custom callback for SQLite logging — set LITELLM_LOG_TO_FILE=1 
  # and point success_callback/failure_callback below after proxy starts.
  # See: https://docs.litellm.ai/docs/proxy/custom_pricing
  drop_params: True

router_settings:
  num_retries: 2
  allowed_fails: 3